{# Brief, shared error block (message + back link). Included by session_error.html
   for full-page 422s, and rendered directly as an HTMX fragment by endpoints that
   swap just this block. Expects a `message` string in context. #}
<div class="mx-auto max-w-md px-6 py-24 text-center">
  <h1 class="text-2xl font-semibold text-compassion">Something needs fixing</h1>
  <p class="mt-4 text-slate-600">{{ message }}</p>
  <a href="/" class="mt-6 inline-block text-compassion underline">Go back</a>
</div>
